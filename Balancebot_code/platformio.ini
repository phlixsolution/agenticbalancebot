; ============================================================
; BalanceBot - PlatformIO Projektkonfiguration
;
; Umgebungen (Environments):
;   balance_v1       - Erste funktionierende Version (balance.cpp, Referenz)
;   balance          - Neue modulare Regelung (src/balance/, in Entwicklung)
;   carrier_timing   - Charakterisierung des Motor Carrier I2C-Pfads
;   imu_latency      - BNO055 Latenz-Messung
;   deadzone_id      - Motortotzone-Identifikation
;
; Flashen:  pio run -e <umgebung> -t upload
; Monitor:  pio device monitor -e <umgebung>
; ============================================================

[common]
; Gemeinsame Einstellungen fuer alle Environments
platform    = atmelsam
board       = nano_33_iot
framework   = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps =
    adafruit/Adafruit BNO055@^1.6.1
    adafruit/Adafruit Unified Sensor@^1.1.14
    arduino-libraries/ArduinoMotorCarrier

; ============================================================
; balance_v1: Erste funktionierende PID-Version (Referenz)
; Kompiliert src/balance.cpp (Monolith, wird nicht veraendert)
; ============================================================
[env:balance_v1]
extends = common
build_src_filter = -<*> +<balance.cpp>

; ============================================================
; balance: Neue modulare Regelung
; Kompiliert alles in src/balance/
; TODO: Implementierung laeuft -- noch nicht vollstaendig
; ============================================================
[env:balance]
extends = common
build_src_filter = -<*> +<balance/>

; ============================================================
; carrier_timing: Motor Carrier I2C-Timing-Test
; Misst Latenz aller Carrier-API-Aufrufe (1000 Iterationen)
; Ergebnis: min/max/mean in Mikrosekunden
; RAEDER IN DER LUFT!
; ============================================================
[env:carrier_timing]
extends = common
build_src_filter = -<*> +<tests/carrier_timing/>

; ============================================================
; imu_latency: BNO055 Latenz-Test
; Misst die Zeit eines getEvent()-Aufrufs (1000 Iterationen)
; Bestimmt ob BNO055 fuer 100 Hz Regelschleife geeignet
; ============================================================
[env:imu_latency]
extends = common
build_src_filter = -<*> +<tests/imu_latency/>

; ============================================================
; deadzone_id: Motor-Totzone-Identifikation
; Rampt Duty langsam hoch und loggt Encoder-Geschwindigkeit
; CSV-Ausgabe fuer Python-Analyse (deadzone_id.py)
; RAEDER IN DER LUFT!
; ============================================================
[env:deadzone_id]
extends = common
build_src_filter = -<*> +<tests/deadzone_id/>
