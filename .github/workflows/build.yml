name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'Balancebot_code/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'Balancebot_code/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    name: Compile ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - balance
          - balance_v1
          - carrier_timing
          - imu_latency
          - deadzone_id

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('Balancebot_code/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Compile ${{ matrix.env }}
        working-directory: Balancebot_code
        run: pio run -e ${{ matrix.env }}
